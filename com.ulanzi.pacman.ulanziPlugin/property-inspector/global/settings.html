<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
  <title>Pac-Man 全局设置</title>
  <link rel="stylesheet" href="../../libs/css/uspi.css">
</head>
<body>
  <div class="uspi-wrapper hidden">

    <div class="uspi-heading" data-localize>网格配置</div>

    <div class="uspi-item">
      <div class="uspi-item-label" data-localize>行数 (Rows)</div>
      <input class="uspi-item-value" type="number"
             name="grid_rows" min="2" max="5" step="1" value="3" id="gridRows">
    </div>

    <div class="uspi-item">
      <div class="uspi-item-label" data-localize>列数 (Columns)</div>
      <input class="uspi-item-value" type="number"
             name="grid_cols" min="2" max="5" step="1" value="3" id="gridCols">
    </div>

    <div class="tip info" data-localize>
      设置游戏网格的大小。修改后会自动重新初始化游戏。
    </div>

    <hr>

    <div class="uspi-heading" data-localize>常用布局</div>

    <div class="tip info">
      <strong>3x3 网格:</strong> 推荐标准布局（行=3, 列=3）⭐
    </div>

    <div class="tip info">
      <strong>3x5 网格:</strong> D200设备竖向布局（行=3, 列=5）
    </div>

    <div class="tip info">
      <strong>2x5 网格:</strong> D200设备横向布局（行=2, 列=5）
    </div>

    <div class="tip warn">
      <strong>注意:</strong> 修改网格大小后，需要重新配置所有按键的位置
    </div>

  </div>

  <script src="../../libs/js/constants.js"></script>
  <script src="../../libs/js/eventEmitter.js"></script>
  <script src="../../libs/js/timers.js"></script>
  <script src="../../libs/js/utils.js"></script>
  <script src="../../libs/js/ulanziApi.js"></script>
  <script src="./settings.js"></script>
</body>
</html>
