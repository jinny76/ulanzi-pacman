<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
  <title>Pac-Man 设置</title>
  <link rel="stylesheet" href="../../libs/css/uspi.css">
</head>
<body>
  <div class="uspi-wrapper hidden">

    <div class="uspi-heading" data-localize>按键位置</div>

    <div class="uspi-item">
      <div class="uspi-item-label" data-localize>行 (Row)</div>
      <input class="uspi-item-value" type="number"
             name="position_row" min="0" max="4" step="1" value="0" id="positionRow">
    </div>

    <div class="uspi-item">
      <div class="uspi-item-label" data-localize>列 (Column)</div>
      <input class="uspi-item-value" type="number"
             name="position_col" min="0" max="4" step="1" value="0" id="positionCol">
    </div>

    <div class="tip info" data-localize>
      请为每个按键配置其在网格中的位置（从0开始计数）
    </div>

    <hr>

    <div class="uspi-heading" data-localize>使用说明</div>

    <div class="tip info">
      <strong>步骤1:</strong> 将此Action添加到多个按键上（建议3x3或2x5布局）
    </div>

    <div class="tip info">
      <strong>步骤2:</strong> 为每个按键配置其在网格中的位置
    </div>

    <div class="tip info">
      <strong>步骤3:</strong> 配置完成后，吃豆人会自动在按键之间移动
    </div>

    <div class="tip warn">
      <strong>提示:</strong> 点击任意按键可暂停/继续游戏
    </div>

  </div>

  <script src="../../libs/js/constants.js"></script>
  <script src="../../libs/js/eventEmitter.js"></script>
  <script src="../../libs/js/timers.js"></script>
  <script src="../../libs/js/utils.js"></script>
  <script src="../../libs/js/ulanziApi.js"></script>
  <script src="./inspector.js"></script>
</body>
</html>
